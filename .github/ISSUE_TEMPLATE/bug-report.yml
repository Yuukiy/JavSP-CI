name: 报告问题(Bug)
description: 报告你遇到的问题(Bug)
title: "用一句话描述这个问题"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        为了方便复现和排查问题，请按照下面的提示补充问题详情
  - type: textarea
    id: what-happened
    attributes:
      label: 问题详情
      description: 描述这个bug的出现场景、现象等
      placeholder: 如果这个问题只在部分影片上出现，必须附上这些影片的原始文件名或者番号
    validations:
      required: true
  - type: dropdown
    id: execute-method
    attributes:
      label: 运行方式
      description: 你运行的是打包后的exe程序吗？
      options:
        - 是的
        - 不是，我是从源代码运行的
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 请打开软件所在目录下的`JavSP.log`文件并将相关的内容粘贴到这里
      render: log
  - type: checkboxes
    id: promise
    attributes:
      label: 提交须知
      description: 提交问题前，请确认你使用的是[最新版本](https://github.com/Yuukiy/JavSP/releases/latest)并且已经阅读过[Wiki帮助文档](https://github.com/Yuukiy/JavSP/wiki)
      options:
        - label: 我确认使用的是最新版本并且阅读过Wiki帮助文档
          required: true
